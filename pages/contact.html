      <section>

        <address>
          <a href="mailto:kazuyamiyata18@gmail.com">kazuyamiyata18@gmail.com</a><br>

        </address>

      <section>
        <h3>Contact Form:</h3>
      <p>Please enter your information here<br>Use the <kbd>method</kbd> to specify perferred form of contact.</p>
  
      <form action="/submit" method="post">
  
        <fieldset>
          <legend>Contact Information</legend>
          <p>Preferred Language</p>
          <input type="text" name="language" id="language">
          <datalist id="lang">
            <option value="en">English</option>
            <option value="jpn">Japanese</option>
          </datalist>
        </fieldset>
  
        <fieldset>
          <legend>Details</legend>
          <div>
            <label for="method">What is your preferred method of contact?</label><br>
            <select id="method" name="method" >
              <optgroup label="Email">
                <option value="asap">ASAP</option>
                <option value="couple-days">Within a couple days</option>
                <option value="Whenever">Whenever</option>
              </optgroup>
              <optgroup label="Phone">
                <option value="asap">ASAP</option>
                <option value="couple-days">Within a couple days</option>
                <option value="Whenever">Whenever</option>
              </optgroup>
            </select>
          </div>
          <div>
            <label for="reason">Reason for contact</label><br>
            <textarea id="reason" name="reason" ></textarea>
          </div>
          <div>
            <button type="submit">Submit</button>
          </div>
        </fieldset>
        
      </form> 
      </section>
